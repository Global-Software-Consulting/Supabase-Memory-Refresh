name: Scheduled sync

on:
  schedule:
    # Every 4 days at 06:17 UTC (days 1,5,9,13,17,21,25,29 of each month).
    # Off-the-hour minute avoids GitHub's busiest scheduling slots.
    # NOTE: the day counter resets at month start, so the gap from day 29 to
    # the next day 1 is shorter than 4 days. See crontab.guru.
    - cron: "17 6 */4 * *"
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      # Stored as a repository secret. One endpoint per line, with an
      # optional label after the URL: "https://...   my-project"
      ENDPOINTS: ${{ secrets.ENDPOINTS }}
      # Stored as a repository secret. Must match the CRON_SECRET set in the
      # app's env so the endpoint's "Bearer" auth check passes. Leave unset if
      # the endpoint has no auth gate.
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      # Direct Supabase REST keep-alive. Full URL (incl. ?select=...&limit=1)
      # and the project's anon key, both stored as repository secrets.
      SUPABASE_REST_URL: ${{ secrets.SUPABASE_REST_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - name: Ping each endpoint
        run: |
          set -uo pipefail

          if [ -z "${ENDPOINTS:-}" ]; then
            echo "❌ ENDPOINTS secret is empty or not set."
            echo "Add it under Settings → Secrets and variables → Actions → New repository secret."
            exit 1
          fi

          failures=0
          total=0

          # Read the secret line by line: skip blanks and comments.
          while IFS= read -r line || [ -n "$line" ]; do
            line="$(echo "$line" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
            [ -z "$line" ] && continue
            case "$line" in \#*) continue ;; esac

            url="$(echo "$line" | awk '{print $1}')"
            label="$(echo "$line" | awk '{$1=""; sub(/^ /,""); print}')"
            [ -z "$label" ] && label="project-$((total + 1))"

            total=$((total + 1))

            # -s silent, -S show errors, -L follow redirects, -m 30 timeout,
            # --retry for transient flakiness. Capture only the HTTP status code
            # so the URL is never printed to the (public) logs.
            code="$(curl -sS -L -m 30 --retry 3 --retry-delay 5 \
                      -H "Authorization: Bearer ${CRON_SECRET:-}" \
                      -o /dev/null -w '%{http_code}' "$url" || echo "000")"

            if [ "$code" -ge 200 ] && [ "$code" -lt 400 ]; then
              echo "✅ [$label] -> $code"
            else
              echo "❌ [$label] -> $code"
              failures=$((failures + 1))
            fi
          done <<< "$ENDPOINTS"

          echo "-----------------------------------------"
          echo "Pinged $total endpoint(s), $failures failure(s)."

          if [ "$failures" -gt 0 ]; then
            exit 1
          fi

      - name: Ping Supabase REST (restaurants)
        run: |
          set -uo pipefail

          if [ -z "${SUPABASE_REST_URL:-}" ] || [ -z "${VITE_SUPABASE_ANON_KEY:-}" ]; then
            echo "❌ SUPABASE_REST_URL or VITE_SUPABASE_ANON_KEY secret is not set."
            echo "Add them under Settings → Secrets and variables → Actions."
            exit 1
          fi

          # Direct Supabase REST API needs BOTH the apikey header and a Bearer
          # token (the anon key for both). Capture only the status code so the
          # URL/key never reach the (public) logs.
          code="$(curl -sS -m 30 --retry 3 --retry-delay 5 \
                    -H "apikey: ${VITE_SUPABASE_ANON_KEY}" \
                    -H "Authorization: Bearer ${VITE_SUPABASE_ANON_KEY}" \
                    -o /dev/null -w '%{http_code}' "${SUPABASE_REST_URL}" || echo "000")"

          if [ "$code" -ge 200 ] && [ "$code" -lt 400 ]; then
            echo "✅ [supabase-restaurants] -> $code"
          else
            echo "❌ [supabase-restaurants] -> $code"
            exit 1
          fi
